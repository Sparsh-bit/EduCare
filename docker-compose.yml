version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ndps_db
    restart: unless-stopped
    env_file: ./db.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ndps_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      FRONTEND_URL: http://localhost:3000
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: ndps_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local

volumes:
  pgdata:
  uploads:
