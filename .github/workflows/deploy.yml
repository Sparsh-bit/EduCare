# ─────────────────────────────────────────────────────────────────────────────
# EduCare ERP — AWS ECS Fargate Deployment
#
# Triggered on every push to `main`.
# Builds Docker images, pushes to ECR, and deploys to ECS Fargate.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID          IAM user access key (deploy-only policy)
#   AWS_SECRET_ACCESS_KEY      IAM user secret key
#   AWS_REGION                 e.g. ap-south-1
#   ECR_REGISTRY               e.g. 123456789012.dkr.ecr.ap-south-1.amazonaws.com
#   ECR_BACKEND_REPO           ECR repo name, e.g. ndps-erp-backend
#   ECR_FRONTEND_REPO          ECR repo name, e.g. ndps-erp-frontend
#   ECS_CLUSTER                ECS cluster name, e.g. ndps-erp-cluster
#   ECS_BACKEND_SERVICE        ECS service name, e.g. ndps-erp-backend-service
#   ECS_FRONTEND_SERVICE       ECS service name, e.g. ndps-erp-frontend-service
#   BACKEND_TASK_DEF_FAMILY    Task def family name, e.g. ndps-erp-backend
#   FRONTEND_TASK_DEF_FAMILY   Task def family name, e.g. ndps-erp-frontend
#   BACKEND_CONTAINER_NAME     Container name in the task def, e.g. ndps-erp-backend
#   FRONTEND_CONTAINER_NAME    Container name in the task def, e.g. ndps-erp-frontend
#
# Required for frontend build (baked into static assets at build time):
#   NEXT_PUBLIC_API_URL        e.g. https://api.ndps.edu.in/api
#   NEXT_PUBLIC_SUPABASE_URL   e.g. https://xxx.supabase.co
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── Run tests before building images ──────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-32-chars
          AADHAAR_ENCRYPTION_KEY: test-aadhaar-key-that-is-at-least-32-chars

  # ── Build and deploy backend ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to ECS
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build-push.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image to ECR
        id: build-push
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_BACKEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.BACKEND_TASK_DEF_FAMILY }} \
            --query taskDefinition \
            > backend-task-def.json

      - name: Update backend task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: ${{ secrets.BACKEND_CONTAINER_NAME }}
          image: ${{ steps.build-push.outputs.image }}

      - name: Deploy backend to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_BACKEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Build and deploy frontend ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to ECS
    runs-on: ubuntu-latest
    needs: [test, deploy-backend]   # Frontend deploys after backend is healthy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image to ECR
        id: build-push
        working-directory: frontend
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_FRONTEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.FRONTEND_TASK_DEF_FAMILY }} \
            --query taskDefinition \
            > frontend-task-def.json

      - name: Update frontend task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: ${{ secrets.FRONTEND_CONTAINER_NAME }}
          image: ${{ steps.build-push.outputs.image }}

      - name: Deploy frontend to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_FRONTEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "Deployment failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
